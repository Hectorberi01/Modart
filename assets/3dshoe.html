<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          background: #f5f5f5;
          overflow: hidden;
          font-family: 'Courier New', monospace;
          color: #333;
        }

        #canvas-container {
          width: 100vw;
          height: 100vh;
          position: relative;
        }

        canvas { display: block; }

        #hud {
          position: absolute;
          top: 16px;
          left: 16px;
          pointer-events: none;
          z-index: 10;
        }

        #hud .hud-line {
          font-size: 11px;
          letter-spacing: 1px;
          color: #555;
          margin-bottom: 4px;
        }

        #hud .hud-line.warn {
          color: #e53935;
        }

        #status {
          position: absolute;
          bottom: 16px;
          right: 16px;
          font-size: 10px;
          letter-spacing: 2px;
          text-transform: uppercase;
          pointer-events: none;
          z-index: 10;
          color: #999;
        }

        #status .dot {
          display: inline-block;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #ccc;
          margin-right: 6px;
          vertical-align: middle;
          transition: background 0.3s;
        }

        #status.connected .dot {
          background: #43a047;
          box-shadow: 0 0 6px rgba(67, 160, 71, 0.5);
        }

        #status.connected { color: #43a047; }
        #status.disconnected { color: #999; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
    <div class="hud-line" id="hud-angle">ANGLE X: -- / Y: --</div>
    <div class="hud-line" id="hud-mag">MAG: -- g</div>
    <div class="hud-line" id="hud-delta">DELTA: --</div>
    <div class="hud-line" id="hud-pas">PAS: -- | DIST: -- m</div>
    <div class="hud-line" id="hud-gyro">GYRO X: -- Y: -- Z: --</div>
    <div class="hud-line" id="hud-pos">POSTURE: --</div>
</div>

<div id="status" class="disconnected">
    <span class="dot"></span>EN ATTENTE
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f5);

    // Camera top-down (vue du dessus)
    const frustumSize = 6;
    const aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.OrthographicCamera(
      -frustumSize / 2, frustumSize / 2,
      frustumSize / 2 / aspect, -frustumSize / 2 / aspect,
      0.1, 100
    );
    camera.position.set(0, 10, 0);
    camera.up.set(0, 0, -1);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0xf5f5f5);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambientLight);

    const topLight = new THREE.DirectionalLight(0xffffff, 0.5);
    topLight.position.set(0, 10, 0);
    scene.add(topLight);

    // 8x8 grid
    const gridHelper = new THREE.GridHelper(8, 8, 0xcccccc, 0xe0e0e0);
    gridHelper.position.y = -0.01;
    scene.add(gridHelper);

    // Shoe = simple rectangle + front marker
    const shoeGroup = new THREE.Group();

    const shoeGeo = new THREE.BoxGeometry(0.8, 0.1, 2.0);
    const shoeMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      roughness: 0.7,
      metalness: 0.1
    });
    const shoe = new THREE.Mesh(shoeGeo, shoeMat);
    shoe.position.y = 0.05;
    shoeGroup.add(shoe);

    // Front marker (vert) pour repérer l'avant
    const markerGeo = new THREE.BoxGeometry(0.3, 0.11, 0.1);
    const markerMat = new THREE.MeshStandardMaterial({
      color: 0x43a047,
      roughness: 0.5
    });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(0, 0.055, 0.95);
    shoeGroup.add(marker);

    scene.add(shoeGroup);

    // State
    let targetRotation = { x: 0, y: 0, z: 0 };
    let currentRotation = { x: 0, y: 0, z: 0 };
    let lastUpdateTime = 0;
    const LERP_FACTOR = 0.12;

    // ========================================================
    // UPDATE FUNCTION (called from Flutter)
    // ========================================================
    window.updateShoe = function(jsonString) {
      try {
        const data = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;

        const gx = parseFloat(data.gx) || 0;
        const gy = parseFloat(data.gy) || 0;
        const gz = parseFloat(data.gz) || 0;
        const angleX = parseFloat(data.angle_x) || 0;
        const angleY = parseFloat(data.angle_y) || 0;
        const mag = parseFloat(data.mag) || 1;
        const delta = parseFloat(data.delta) || 0;
        const pas = parseInt(data.pas) || 0;
        const distance = data.distance_m || '--';
        const mauvais = data.mauvais_positionnement || false;

        // Mapping capteur → Three.js (à ajuster selon montage physique)
        targetRotation.x = (angleY * Math.PI) / 180;
        targetRotation.z = (angleX * Math.PI) / 180;
        targetRotation.y += (gz * 0.01 * Math.PI) / 180;

        // HUD
        document.getElementById('hud-angle').textContent =
          'ANGLE X: ' + angleX.toFixed(1) + '\u00B0 / Y: ' + angleY.toFixed(1) + '\u00B0';
        document.getElementById('hud-mag').textContent =
          'MAG: ' + mag.toFixed(3) + ' g';
        document.getElementById('hud-delta').textContent =
          'DELTA: ' + delta.toFixed(4);
        document.getElementById('hud-pas').textContent =
          'PAS: ' + pas + ' | DIST: ' + distance + ' m';
        document.getElementById('hud-gyro').textContent =
          'GYRO X: ' + gx.toFixed(1) + ' Y: ' + gy.toFixed(1) + ' Z: ' + gz.toFixed(1);

        const hudPos = document.getElementById('hud-pos');
        if (mauvais) {
          hudPos.textContent = 'POSTURE: MAUVAISE';
          hudPos.className = 'hud-line warn';
        } else {
          hudPos.textContent = 'POSTURE: OK';
          hudPos.className = 'hud-line';
        }

        const statusEl = document.getElementById('status');
        statusEl.className = 'connected';
        statusEl.innerHTML = '<span class="dot"></span>CONNECT\u00C9';
        lastUpdateTime = Date.now();

      } catch (e) {
        console.error('updateShoe error:', e);
      }
    };

    // ========================================================
    // ANIMATION LOOP (pas d'animation idle)
    // ========================================================
    function animate() {
      requestAnimationFrame(animate);

      currentRotation.x += (targetRotation.x - currentRotation.x) * LERP_FACTOR;
      currentRotation.y += (targetRotation.y - currentRotation.y) * LERP_FACTOR;
      currentRotation.z += (targetRotation.z - currentRotation.z) * LERP_FACTOR;

      shoeGroup.rotation.x = currentRotation.x;
      shoeGroup.rotation.y = currentRotation.y;
      shoeGroup.rotation.z = currentRotation.z;

      if (Date.now() - lastUpdateTime > 3000) {
        const statusEl = document.getElementById('status');
        statusEl.className = 'disconnected';
        statusEl.innerHTML = '<span class="dot"></span>EN ATTENTE';
      }

      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', function() {
      const newAspect = window.innerWidth / window.innerHeight;
      camera.top = frustumSize / 2 / newAspect;
      camera.bottom = -frustumSize / 2 / newAspect;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ========================================================
    // TEST MODE (décommenter pour tester dans le navigateur)
    // ========================================================
    /*
    function simulateData() {
      const t = Date.now() * 0.001;
      updateShoe(JSON.stringify({
        t: Date.now(),
        pas: Math.floor(t / 2) % 100,
        distance_m: (Math.floor(t / 2) % 100 * 0.75).toFixed(2),
        ax: (Math.sin(t) * 0.3).toFixed(3),
        ay: (-0.87 + Math.sin(t * 1.3) * 0.1).toFixed(3),
        az: (-0.5 + Math.cos(t) * 0.2).toFixed(3),
        gx: (Math.sin(t * 2) * 10).toFixed(2),
        gy: (Math.cos(t * 1.5) * 5).toFixed(2),
        gz: (Math.sin(t * 0.7) * 3).toFixed(2),
        mag: (1.0 + Math.sin(t * 3) * 0.15).toFixed(3),

        angle_x: (Math.sin(t) * 20).toFixed(1),

        mauvais_positionnement: Math.sin(t) > 0.5
      }));
    }
    setInterval(simulateData, 100);
    */
</script>

</body>
</html>
